<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!------------Style sheet---------------->

    <link rel="stylesheet" href="style.css">

    <!-------------Bootstrap-------------------------->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-----------------------Bootstarp icon-------------------->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <topbar>
        <div>
            <h2>Logo</h2>
        </div>
    </topbar>
    <div class="w-100 p-4 d-flex justify-content-end">
        <button class="btn btn-primary" id="btn-addSkill"> <span>
                <i class="bi bi-plus-lg"></i>
            </span>Add Skill</button>
    </div>
    <section class="playground">
        <p class="content">User interface</p>
        <p class="content">Experience</p>
        <p class="content">Works</p>
        <p class="content">Wireframe</p>
        <p class="content">Prototype</p>
        <p class="content">Animation</p>
        <p class="content">Graphic Design</p>
        <p class="content">Branding</p>
        <div class="container-bg">
            <p>Drag play</p>
        </div>
    </section>


    <popup class="w-100 h-100 popup p-4" id="pop-up">
        <div class="popup-container container">
            <div class="d-flex popup-header">
                <p class="m-0">Add Skill</p>
                <span class=" btn-close" id="skill-close"></span>
            </div>

            <form action="" class="d-flex flex-column gap-2 justify-content-center align-item-center">
                <input type="text" placeholder="Enter you Skill" class="input p-1 w-75" id="skillInput" required>
                <button type="submit" class="btn btn-primary w-50" id="btn-submit">Submit</button>
            </form>
        </div>
    </popup>

    <div class="popup-container" id="popup-right">

        <p class="m-0">Delete</p>

    </div>

</body>
<script src="javascript.js"></script>
<script src="javascripts.js"></script>

</html>
